name: Gerar animação das contribuições

on:
  schedule:
    - cron: "0 3 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    name: Gerar cobrinha
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Gerar arquivos SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Jvtopsilva090
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake-purple.svg?color_snake=%238B5CF6&color_dots=%23161B22,%23282A3A,%234B3F72,%237C3AED,%23A78BFA

      - name: Publicar na branch output
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
          jekyll: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
